services:
  api:
    build:
      context: ../backend
      dockerfile: ../docker/api/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - redis
    environment:
      ConnectionStrings__Default: Host=postgres;Database=easyagree;Username=easyagree;Password=easyagree
      Redis__Connection: redis:6379
      AgreementSeeder__SourcePath: /agreements
      # Set AI_API_KEY in your shell or an untracked .env file — never commit it.
      Ai__ApiKey: ${AI_API_KEY:?Set AI_API_KEY in your environment or a .env file}
    volumes:
      - ../agreements:/agreements:ro
      - uploads_data:/app/uploads

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: easyagree
      POSTGRES_USER: easyagree
      POSTGRES_PASSWORD: easyagree
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
