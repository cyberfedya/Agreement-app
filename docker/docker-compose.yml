services:
  api:
    build:
      context: ../backend
      dockerfile: ../docker/api/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - redis
    environment:
      ConnectionStrings__Default: Host=postgres;Database=easyagree;Username=easyagree;Password=easyagree
      Redis__Connection: redis:6379

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: easyagree
      POSTGRES_USER: easyagree
      POSTGRES_PASSWORD: easyagree
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
